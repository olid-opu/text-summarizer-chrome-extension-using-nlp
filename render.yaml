services:
  - type: web_service
    name: text-summarizer-backend
    env: python
    plan: starter
    branch: main
    root: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: HUGGINGFACE_API_TOKEN
        value: ""

  - type: static_site
    name: text-summarizer-frontend
    branch: main
    root: extension
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://text-summarizer-chrome-extension-using-c2m6.onrender.com"
